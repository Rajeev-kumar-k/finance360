<div class="travel-container">

  <div class="page-header">

    <h1>
      ✈ Travel Request
    </h1>

    <p>
      Submit travel approval requests before raising expenses.
    </p>

  </div>

  <div class="form-card">

    <div class="section-title">
      Request Information
    </div>

    <div class="grid">

      <div>
        <label>Request ID</label>
        <input
          [value]="requestId"
          readonly>
      </div>

      <div>
        <label>Employee Name</label>
        <input
          [value]="employeeName"
          readonly>
      </div>

      <div>
        <label>Employee ID</label>
        <input
          [value]="employeeId"
          readonly>
      </div>
      

      <div>
        <label>Department</label>
        <input
          [value]="department"
          readonly>
      </div>

      <div>
        <label>Manager</label>
        <input
          [value]="manager"
          readonly>
      </div>

    </div>

    <div class="section-title">
      Travel Details
    </div>

    <div class="grid">

      <div>
        <label>Destination City *</label>
        <input
          [(ngModel)]="destinationCity">
      </div>

      <div>
        <label>Destination Country *</label>
        <input
          [(ngModel)]="destinationCountry">
      </div>

      <div class="full-width">
        <label>Purpose of Travel *</label>
        <textarea
          rows="3"
          [(ngModel)]="purpose">
        </textarea>
      </div>

      <div>
        <label>Travel Start Date *</label>
        <input
          type="date"
          [(ngModel)]="startDate">
      </div>

      <div>
        <label>Travel End Date *</label>
        <input
          type="date"
          [(ngModel)]="endDate">
      </div>

    </div>

    <div class="section-title">
      Estimated Budget
    </div>

    <div class="grid">

      <div>
        <label>Hotel Cost</label>
        <input
          type="number"
          [(ngModel)]="hotelCost">
      </div>

      <div>
        <label>Flight Cost</label>
        <input
          type="number"
          [(ngModel)]="flightCost">
      </div>

      <div>
        <label>Local Travel Cost</label>
        <input
          type="number"
          [(ngModel)]="localTravelCost">
      </div>

      <div>
        <label>Food Cost</label>
        <input
          type="number"
          [(ngModel)]="foodCost">
      </div>

    </div>

    <div class="section-title">
      Approval Mail
    </div>

    <div class="upload-box">

      <input
        type="file"
        accept=".pdf,.jpg,.jpeg,.png,.msg,.eml"
        (change)="onApprovalMailSelected($event)">

      <div
        *ngIf="approvalMail">

        📎
        {{ approvalMail.name }}

      </div>

    </div>

    <div class="section-title">
      Additional Remarks
    </div>

    <textarea
      rows="4"
      [(ngModel)]="remarks">
    </textarea>

    <div class="actions">

      <button
        class="submit-btn"
        (click)="submitRequest()">

        Submit Request

      </button>

    </div>

    <div
  class="success-overlay"
  *ngIf="showDialog">

  <div class="success-dialog">

    <div class="success-icon">

      ✓

    </div>

    <h2>
      Travel Request Submitted
    </h2>

    <p>

      Request ID:

      <strong>
        {{submittedRequestId}}
      </strong>

    </p>

    <button
      class="close-btn"
      (click)="showDialog = false">

      Close

    </button>

  </div>

</div>

  </div>

</div>
